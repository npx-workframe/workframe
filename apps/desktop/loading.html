<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workframe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0F;
      color: #E4E4E7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      -webkit-app-region: drag;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #27272A;
      border-top-color: #A78BFA;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text {
      font-size: 13px;
      color: #71717A;
      letter-spacing: 0.3px;
    }
    .error-text {
      font-size: 13px;
      color: #EF4444;
      max-width: 320px;
      text-align: center;
      line-height: 1.4;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="indicator">
    <div class="spinner" id="spinner"></div>
    <div class="status-text" id="statusText">Connecting to Workframe…</div>
    <div class="error-text hidden" id="errorText"></div>
  </div>

  <script>
    const spinner = document.getElementById('spinner')
    const statusText = document.getElementById('statusText')
    const errorText = document.getElementById('errorText')

    window.workframe?.onConnectionChange((state) => {
      if (state === 'connecting') {
        spinner.classList.remove('hidden')
        statusText.classList.remove('hidden')
        errorText.classList.add('hidden')
        statusText.textContent = 'Connecting to Workframe…'
      } else if (state === 'connected') {
        spinner.classList.add('hidden')
        statusText.classList.add('hidden')
        errorText.classList.add('hidden')
      } else if (state === 'error') {
        spinner.classList.add('hidden')
        statusText.classList.add('hidden')
        errorText.classList.remove('hidden')
        errorText.textContent = 'Could not connect. Check your connection URL and try again.'
      }
    })
  </script>
</body>
</html>
