name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Public repo verify
        run: pnpm verify:public

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: API typecheck
        run: pnpm --filter @workframe/workframe-api typecheck

      - name: Build web
        run: pnpm build:web

      - name: Bundle UI for scaffold package
        run: node packages/create-workframe/scripts/bundle-workframe-ui.mjs --skip-build

      - name: Scaffold smoke test
        run: pnpm test:scaffold
