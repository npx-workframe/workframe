name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"

      - name: API Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install -r services/workframe-api/requirements.txt

      - name: Version agreement
        run: node scripts/workframe/verify-version-agreement.mjs

      - name: Docs claim gate
        run: node scripts/workframe/verify-docs-claims.mjs

      - name: Release evidence fixtures
        run: node scripts/workframe/validate-release-evidence.mjs

      - name: Harness verify
        env:
          HARNESS_CHECK: "1"
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: node .harness/verify.mjs

      - name: Installer UI bundle
        run: node packages/create-workframe/scripts/bundle-workframe-ui.mjs --skip-build

      - name: Package install evidence
        run: node scripts/workframe/run-package-install-evidence.mjs --build

      - name: Negative install evidence
        run: node scripts/workframe/run-negative-install-evidence.mjs
