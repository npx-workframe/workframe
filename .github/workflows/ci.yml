name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Version agreement
        run: node scripts/workframe/verify-version-agreement.mjs

      - name: Harness verify
        env:
          HARNESS_CHECK: "1"
        run: node .harness/verify.mjs

      - name: Installer UI bundle
        run: node packages/create-workframe/scripts/bundle-workframe-ui.mjs --skip-build
