# Publish Workframe npm packages via npm trusted publishing (OIDC).
# create-workframe remains tag/manual-only. The standalone workframe entrypoint
# publishes independently when its own package changes on main.
name: Publish npm

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
    paths:
      - 'packages/workframe/**'
      - '.github/workflows/publish-npm.yml'
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # OIDC for npm trusted publishing
  contents: read

jobs:
  publish-create-workframe:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag matches package versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          for pkg in packages/create-workframe; do
            VER="$(node -p "require('./$pkg/package.json').version")"
            if [ "$VER" != "$TAG" ]; then
              echo "version mismatch: $pkg is $VER but tag is v$TAG"
              exit 1
            fi
          done
          echo "OK: all packages at $TAG"

      - name: Operator denylist
        env:
          PATTERNS: ${{ secrets.VERIFY_PUBLIC_PATTERNS_JSON }}
        run: |
          if [ -z "$PATTERNS" ]; then
            echo 'missing GitHub secret VERIFY_PUBLIC_PATTERNS_JSON'
            echo 'paste scripts/workframe/verify-public-patterns.local.json (gitignored)'
            exit 1
          fi
          printf '%s\n' "$PATTERNS" > scripts/workframe/verify-public-patterns.local.json

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Public repo verify (strict)
        env:
          VERIFY_PUBLIC_STRICT: '1'
        run: pnpm verify:public

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.12'

      - name: API Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install -r services/workframe-api/requirements.txt

      - name: API typecheck
        working-directory: services/workframe-api
        run: ${{ steps.setup-python.outputs.python-path }} -m py_compile server.py zk_auth.py email_sender.py profile_config_yaml.py route_registry.py

      - name: Build web
        run: pnpm build:web

      - name: Bundle UI for installer package
        run: node packages/create-workframe/scripts/bundle-workframe-ui.mjs --skip-build

      - name: Scaffold smoke test
        run: pnpm test:scaffold

      - name: npm CLI (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish create-workframe
        working-directory: packages/create-workframe
        run: npm publish --access public

      - name: Verify registry
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          for pkg in create-workframe; do
            for i in $(seq 1 12); do
              v="$(npm view "$pkg" version 2>/dev/null || true)"
              if [ "$v" = "$TAG" ]; then
                echo "OK: $pkg@$v"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "npm view $pkg did not show $TAG (last: $v)"
                exit 1
              fi
              sleep 5
            done
          done

  publish-workframe:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Smoke test standalone CLI
        working-directory: packages/workframe
        run: npm test

      - name: npm CLI (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check registry version
        id: registry
        working-directory: packages/workframe
        run: |
          VER="$(node -p "require('./package.json').version")"
          CURRENT="$(npm view workframe version 2>/dev/null || true)"
          echo "package_version=$VER" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$VER" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "workframe@$VER is already published; skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Publishing workframe@$VER; registry currently has ${CURRENT:-none}"
          fi

      - name: Publish workframe
        if: steps.registry.outputs.already_published != 'true'
        working-directory: packages/workframe
        run: npm publish --access public

      - name: Verify registry
        if: steps.registry.outputs.already_published != 'true'
        run: |
          VER="${{ steps.registry.outputs.package_version }}"
          for i in $(seq 1 12); do
            v="$(npm view workframe version 2>/dev/null || true)"
            if [ "$v" = "$VER" ]; then
              echo "OK: workframe@$v"
              exit 0
            fi
            sleep 5
          done
          echo "npm view workframe did not show $VER (last: $v)"
          exit 1
